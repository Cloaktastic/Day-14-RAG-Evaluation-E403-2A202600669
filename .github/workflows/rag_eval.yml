name: RAG Evaluation Quality Gate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test_and_evaluate:
    name: Run Unit Tests & Evaluation Benchmark
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest deepeval dotenv openai python-dotenv

    - name: Run logic unit tests
      run: |
        pytest tests/ -v
